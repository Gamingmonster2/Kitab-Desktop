        /* --- Menus Management --- */
        const settingsBtn = document.getElementById('settingsBtn');
        const settingsMenu = document.getElementById('settingsMenu');
        const pageMenuBtn = document.getElementById('pageMenuBtn');
        const pageMenu = document.getElementById('pageMenu');
        
        let isSettingsOpen = false;
        let isPageMenuOpen = false;

        // Settings Menu Toggle
        settingsBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            isSettingsOpen = !isSettingsOpen;
            if (isSettingsOpen) {
                isPageMenuOpen = false;
                updateMenus();
            } else {
                updateMenus();
            }
        });

        // Page Menu Toggle
        pageMenuBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            isPageMenuOpen = !isPageMenuOpen;
            if (isPageMenuOpen) {
                isSettingsOpen = false;
                updateMenus();
            } else {
                updateMenus();
            }
        });

        document.addEventListener('click', (e) => {
            if (isSettingsOpen && !settingsMenu.contains(e.target) && !settingsBtn.contains(e.target)) {
                isSettingsOpen = false;
                updateMenus();
            }
            if (isPageMenuOpen && !pageMenu.contains(e.target) && !pageMenuBtn.contains(e.target)) {
                isPageMenuOpen = false;
                updateMenus();
            }
        });

        function updateMenus() {
            if (isSettingsOpen) {
                settingsMenu.classList.remove('hide-dropdown');
                settingsMenu.classList.add('show-dropdown');
            } else {
                settingsMenu.classList.add('hide-dropdown');
                settingsMenu.classList.remove('show-dropdown');
            }

            if (isPageMenuOpen) {
                pageMenu.classList.remove('hide-menu');
                pageMenu.classList.add('show-menu');
                if(window.innerWidth > 768) {
                    setTimeout(() => document.getElementById('pageJumpInput').focus(), 100);
                }
            } else {
                pageMenu.classList.add('hide-menu');
                pageMenu.classList.remove('show-menu');
            }
        }

        /* --- Theme Management --- */
        function changeTheme(theme) {
            document.body.classList.remove('theme-light', 'theme-sepia', 'theme-dark');
            document.body.classList.add(`theme-${theme}`);
            localStorage.setItem('kitab-theme', theme);
            isSettingsOpen = false;
            updateMenus();
        }

        const savedTheme = localStorage.getItem('kitab-theme');
        if (savedTheme) changeTheme(savedTheme);

        /* --- Focus Mode (Fullscreen) Management --- */
        const focusBtn = document.getElementById('focusBtn');
        const exitFocusBtn = document.getElementById('exitFocusBtn');
        const mainHeader = document.getElementById('mainHeader');
        const bottomNav = document.getElementById('bottomNav');
        const topSpacer = document.getElementById('topSpacer');

        function enterFocusMode() {
            // Request Native Fullscreen
            const docElm = document.documentElement;
            if (docElm.requestFullscreen) {
                docElm.requestFullscreen().catch(err => console.log(err));
            } else if (docElm.webkitRequestFullscreen) {
                docElm.webkitRequestFullscreen();
            }

            // Hide UI Elements gracefully
            mainHeader.classList.add('-translate-y-full', 'opacity-0');
            bottomNav.classList.add('translate-y-32', 'opacity-0');
            topSpacer.classList.add('hidden');
            
            // Show Exit Button
            exitFocusBtn.classList.remove('opacity-0', 'pointer-events-none', '-translate-y-4');
            
            // Close any open menus
            isSettingsOpen = false;
            isPageMenuOpen = false;
            updateMenus();
        }

        function exitFocusMode() {
            // Exit Native Fullscreen
            if (document.fullscreenElement || document.webkitFullscreenElement) {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                } else if (document.webkitExitFullscreen) {
                    document.webkitExitFullscreen();
                }
            }

            // Show UI Elements gracefully
            mainHeader.classList.remove('-translate-y-full', 'opacity-0');
            bottomNav.classList.remove('translate-y-32', 'opacity-0');
            topSpacer.classList.remove('hidden');
            
            // Hide Exit Button
            exitFocusBtn.classList.add('opacity-0', 'pointer-events-none', '-translate-y-4');
        }

        focusBtn.addEventListener('click', enterFocusMode);
        exitFocusBtn.addEventListener('click', exitFocusMode);

        // Sync UI if user exits fullscreen via ESC key or browser native controls
        document.addEventListener('fullscreenchange', () => {
            if (!document.fullscreenElement) exitFocusMode();
        });
        document.addEventListener('webkitfullscreenchange', () => {
            if (!document.webkitFullscreenElement) exitFocusMode();
        });

        /* --- Professional Lazy Loading & Rendering Engine --- */
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('quran-container');
            const pageNumDisplay = document.getElementById('page-number');
            
            if (rawImages.length === 0 || (rawImages.length === 1 && rawImages[0].includes("placeholder"))) {
                container.innerHTML = '<div class="p-8 text-center text-slate-500 border-2 border-dashed border-slate-300 rounded-2xl w-full">يرجى إضافة روابط الصور عالية الجودة في مصفوفة rawImages داخل الكود المصدري.</div>';
                return;
            }

            const getPageNum = (url) => {
                const match = url.match(/(\d+)(?=\.(png|jpg|jpeg|webp))/i);
                return match ? parseInt(match[0], 10) : 9999;
            };

            const sortedImages = [...new Set(rawImages)].sort((a, b) => getPageNum(a) - getPageNum(b));

            const lazyLoadObserver = new IntersectionObserver((entries, observer) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        const wrapper = entry.target;
                        const url = wrapper.dataset.src;
                        
                        const img = document.createElement('img');
                        img.src = url;
                        img.alt = `صفحة ${wrapper.dataset.page}`;
                        img.decoding = "async"; 
                        img.className = "quran-page-img opacity-0"; 
                        img.id = `quran-page-${wrapper.dataset.index}`;

                        img.onload = () => {
                            img.classList.remove('opacity-0');
                            wrapper.classList.remove('animate-pulse', 'bg-slate-200/50', 'dark:bg-slate-800/50');
                        };

                        wrapper.appendChild(img);
                        observer.unobserve(wrapper); 
                    }
                });
            }, { rootMargin: '800px 0px', threshold: 0.01 });

            const pageTrackObserver = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        const realPage = entry.target.dataset.page;
                        pageNumDisplay.textContent = realPage;
                        window.currentIndex = parseInt(entry.target.dataset.index);
                    }
                });
            }, { rootMargin: '-40% 0px -40% 0px', threshold: 0 });

            sortedImages.forEach((url, index) => {
                const realPage = getPageNum(url);
                
                const wrapper = document.createElement('div');
                wrapper.className = 'page-wrapper animate-pulse bg-slate-200/50 dark:bg-slate-800/50 rounded-xl shadow-sm';
                wrapper.dataset.src = url;
                wrapper.dataset.index = index;
                wrapper.dataset.page = realPage;
                wrapper.id = `wrapper-${index}`;

                container.appendChild(wrapper);

                lazyLoadObserver.observe(wrapper);
                pageTrackObserver.observe(wrapper);
            });

            window.currentIndex = 0;
            if(sortedImages.length > 0) {
                pageNumDisplay.textContent = getPageNum(sortedImages[0]);
            }
            
            document.getElementById('pageJumpInput').addEventListener('keypress', function (e) {
                if (e.key === 'Enter') {
                    jumpToPage();
                }
            });
        });

        /* --- Navigation Logic --- */
        function scrollToNext() {
            const nextIndex = window.currentIndex + 1;
            const target = document.getElementById(`wrapper-${nextIndex}`);
            if (target) {
                // Adjust scroll position depending on focus mode
                const offset = document.fullscreenElement ? 20 : 100;
                const y = target.getBoundingClientRect().top + window.scrollY - offset;
                window.scrollTo({ top: y, behavior: 'smooth' });
            }
        }

        function scrollToPrev() {
            const prevIndex = window.currentIndex - 1;
            const target = document.getElementById(`wrapper-${prevIndex}`);
            if (target) {
                const offset = document.fullscreenElement ? 20 : 100;
                const y = target.getBoundingClientRect().top + window.scrollY - offset;
                window.scrollTo({ top: y, behavior: 'smooth' });
            }
        }

        function jumpToPage() {
            const input = document.getElementById('pageJumpInput');
            const page = parseInt(input.value);
            if (!page) return;
            
            const target = document.querySelector(`.page-wrapper[data-page="${page}"]`);
            if (target) {
                const offset = document.fullscreenElement ? 20 : 100;
                const y = target.getBoundingClientRect().top + window.scrollY - offset;
                window.scrollTo({ top: y, behavior: 'smooth' });
                input.value = ''; 
                isPageMenuOpen = false;
                updateMenus();
            } else {
                input.value = '';
                input.placeholder = 'غير متوفرة';
                setTimeout(() => input.placeholder = 'رقم', 2000);
            }
        }
    </script>
</body>
</html>
